services:
  google-workspace-mcp:
    build: .
    container_name: google-workspace-mcp
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8347}:${SERVER_PORT:-8347}"
    env_file:
      - .env
    environment:
      - TRANSPORT=http
      - GOOGLE_SERVICE_ACCOUNT_FILE=/secrets/service_account.json
    volumes:
      - ./secret:/secrets:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${SERVER_PORT:-8347}/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

