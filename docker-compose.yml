services:
  mcp:
    build: .
    container_name: google-workspace
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8347}:${SERVER_PORT:-8347}"
    env_file:
      - .env
    environment:
      - TRANSPORT=http
    volumes:
      - ./secret:/secrets:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 8347), timeout=5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
