services:
  google-workspace-mcp:
    build: .
    container_name: google-workspace-mcp
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - TRANSPORT=http
      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
      - LOG_LEVEL=INFO
      # Option B: mount secret file instead of inline JSON
      # - GOOGLE_SERVICE_ACCOUNT_FILE=/run/secrets/service_account
    # secrets:
    #   - service_account
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# secrets:
#   service_account:
#     file: ./secrets/service_account.json
