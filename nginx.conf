# Nginx reverse proxy for google-workspace-mcp
#
# Usage on VPS:
#   sudo cp nginx.conf /etc/nginx/sites-available/google-workspace-mcp
#   sudo ln -s /etc/nginx/sites-available/google-workspace-mcp /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# For SSL (required for Claude Web):
#   sudo certbot --nginx -d gcp.lemacore.com

upstream google_workspace_mcp {
    server 127.0.0.1:8347;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name gcp.lemacore.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server block ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name gcp.lemacore.com;

    # ── SSL (managed by Certbot) ───────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/gcp.lemacore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gcp.lemacore.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/google-workspace-mcp.access.log;
    error_log  /var/log/nginx/google-workspace-mcp.error.log;

    # ── CORS headers (required for Claude Web browser requests) ───────────────
    set $cors_origin "";
    if ($http_origin ~* "^https://(claude\.ai|app\.claude\.ai)$") {
        set $cors_origin $http_origin;
    }

    # ── MCP endpoint ──────────────────────────────────────────────────────────
    location /mcp {
        # Handle CORS preflight (OPTIONS)
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, Mcp-Session-Id, Last-Event-ID" always;
            add_header Access-Control-Max-Age       86400 always;
            return 204;
        }

        proxy_pass         http://google_workspace_mcp;
        proxy_http_version 1.1;

        # Required for Streamable HTTP / SSE (MCP transport)
        proxy_set_header   Connection        "";
        proxy_set_header   Host              localhost;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # CORS response headers
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Mcp-Session-Id, Last-Event-ID" always;

        # Disable buffering — SSE / streaming responses must flush immediately
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
        proxy_connect_timeout  10s;

        # Allow large tool payloads (e.g. bulk spreadsheet writes)
        client_max_body_size   16M;
    }

    # ── MCP OAuth2 Authorization Server endpoints ────────────────────────────
    # These paths are served by FastMCP's built-in OAuth2 AS implementation.
    location = /.well-known/oauth-authorization-server {
        proxy_pass         http://google_workspace_mcp;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              localhost;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout     30s;
        proxy_connect_timeout  10s;
    }

    location = /register {
        proxy_pass         http://google_workspace_mcp;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              localhost;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout     30s;
        proxy_connect_timeout  10s;
        client_max_body_size   1M;
    }

    location = /authorize {
        proxy_pass         http://google_workspace_mcp;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              localhost;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout     30s;
        proxy_connect_timeout  10s;
    }

    location = /token {
        proxy_pass         http://google_workspace_mcp;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              localhost;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout     30s;
        proxy_connect_timeout  10s;
        client_max_body_size   1M;
    }

    location = /revoke {
        proxy_pass         http://google_workspace_mcp;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              localhost;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout     30s;
        proxy_connect_timeout  10s;
    }

    # ── Google OAuth2 callback ────────────────────────────────────────────────
    # Google redirects here after the user approves permissions.
    location = /google/callback {
        proxy_pass         http://google_workspace_mcp;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              localhost;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout     30s;
        proxy_connect_timeout  10s;
    }

    # ── Block everything else ─────────────────────────────────────────────────
    location / {
        return 404;
    }
}
